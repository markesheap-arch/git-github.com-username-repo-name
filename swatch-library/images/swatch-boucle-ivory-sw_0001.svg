<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="1200" viewBox="0 0 1200 1200" role="img" aria-labelledby="title desc">
  <title id="title">Ivory Boucle Swatch</title>
  <desc id="desc">Placeholder ivory boucle texture swatch for the Shopify swatch library.</desc>
  <defs>
    <filter id="softNoise" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.85" numOctaves="5" seed="11" result="noise"/>
      <feColorMatrix in="noise" type="matrix" values="0.25 0 0 0 0.76 0 0.25 0 0 0.72 0 0 0.25 0 0.65 0 0 0 0.2 0" result="tint"/>
      <feBlend in="SourceGraphic" in2="tint" mode="multiply"/>
    </filter>
    <pattern id="loops" width="82" height="82" patternUnits="userSpaceOnUse">
      <rect width="82" height="82" fill="#f4efe7"/>
      <circle cx="18" cy="19" r="13" fill="none" stroke="#fffaf2" stroke-width="8" opacity="0.72"/>
      <circle cx="56" cy="45" r="16" fill="none" stroke="#ded4c6" stroke-width="7" opacity="0.48"/>
      <path d="M-4 67 C18 43 42 91 86 54" fill="none" stroke="#efe4d6" stroke-width="9" stroke-linecap="round" opacity="0.7"/>
      <path d="M6 6 C28 34 48 -9 78 23" fill="none" stroke="#ffffff" stroke-width="5" stroke-linecap="round" opacity="0.55"/>
    </pattern>
  </defs>
  <rect width="1200" height="1200" fill="#f4efe7"/>
  <rect width="1200" height="1200" fill="url(#loops)" filter="url(#softNoise)"/>
  <rect x="24" y="24" width="1152" height="1152" fill="none" stroke="#d8cdbd" stroke-width="24"/>
</svg>
