<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="1200" viewBox="0 0 1200 1200" role="img" aria-labelledby="title desc">
  <title id="title">Charcoal Linen Swatch</title>
  <desc id="desc">Placeholder charcoal woven linen texture swatch for the Shopify swatch library.</desc>
  <defs>
    <pattern id="linenWarp" width="48" height="48" patternUnits="userSpaceOnUse">
      <rect width="48" height="48" fill="#3f3d3a"/>
      <path d="M0 4 H48 M0 17 H48 M0 31 H48 M0 44 H48" stroke="#55524e" stroke-width="4" opacity="0.55"/>
      <path d="M7 0 V48 M22 0 V48 M36 0 V48" stroke="#2f2d2a" stroke-width="5" opacity="0.55"/>
      <path d="M0 12 H48 M0 38 H48" stroke="#6a665f" stroke-width="2" opacity="0.35"/>
      <path d="M14 0 V48 M43 0 V48" stroke="#232220" stroke-width="2" opacity="0.45"/>
    </pattern>
    <filter id="grain" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.55" numOctaves="4" seed="24" result="noise"/>
      <feColorMatrix in="noise" type="saturate" values="0"/>
      <feBlend in="SourceGraphic" mode="overlay"/>
    </filter>
  </defs>
  <rect width="1200" height="1200" fill="#3f3d3a"/>
  <rect width="1200" height="1200" fill="url(#linenWarp)" filter="url(#grain)"/>
  <rect x="24" y="24" width="1152" height="1152" fill="none" stroke="#272522" stroke-width="24"/>
</svg>
